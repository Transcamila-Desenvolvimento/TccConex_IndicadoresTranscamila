name: Deploy TccConex ERP para Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-azure-${{ github.ref }}
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: tccconex-erp # nome do App Service na Azure (msdeploySite do publish profile)
  NODE_VERSION: '20'
  PYTHON_VERSION: '3.12'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Build do frontend (React)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Instalar dependências para build (collectstatic)
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Copiar build do frontend para dentro do backend
        run: |
          rm -rf backend/frontend_dist
          cp -r frontend/dist backend/frontend_dist

      - name: Coletar arquivos estáticos (admin/DRF)
        working-directory: backend
        env:
          DJANGO_SECRET_KEY: build-time-only-not-used-em-producao
        run: python manage.py collectstatic --noinput

      - name: Empacotar artefato de deploy
        run: |
          cd backend
          zip -r ../release.zip . \
            -x "venv/*" -x "venv_local/*" -x "antenv/*" \
            -x ".python_packages/*" -x "__pycache__/*" -x "*/__pycache__/*" \
            -x "tmp/*" -x "media/*" -x "scratch/*" -x "*.bak" -x "db.sqlite3"
          ls -lh ../release.zip

      - name: Deploy no Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
          clean: true
